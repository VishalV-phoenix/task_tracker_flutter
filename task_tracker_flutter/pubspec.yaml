name: productivity_app
description: Personal Productivity Dashboard
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Database ──────────────────────────────
  # SQLite - works on Android/iOS only
  # For Chrome testing we use a mock/memory store
  sqflite: ^2.3.3
  path: ^1.9.0

  # ── State Management ──────────────────────
  provider: ^6.1.2

  # ── Notifications ─────────────────────────
  # Only works on Android/iOS - skip for Chrome testing
  flutter_local_notifications: ^17.2.1
  timezone: ^0.9.4

  # ── File Operations ───────────────────────
  path_provider: ^2.1.3
  file_picker: ^8.0.7
  share_plus: ^9.0.0

  # ── PDF Generation ────────────────────────
  pdf: ^3.10.8
  printing: ^5.12.0

  # ── URL Handling ──────────────────────────
  url_launcher: ^6.3.0

  # ── UI ────────────────────────────────────
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/icons/

# ── App Icon Configuration ──────────────
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/icon.png"
  
  # Adaptive icon (Android 8+)
  # Background color behind your icon
  adaptive_icon_background: "#4F46E5"
  adaptive_icon_foreground: "assets/icons/icon.png"
  
  # Minimum SDK icon (Android 7 and below)
  min_sdk_android: 21
